name: player2-backend

services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    container_name: player2-backend-web
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy  # ✅ Wait for DB health
      redis:
        condition: service_healthy  # ✅ Wait for Redis health
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/home_ad/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build: .
    command: celery -A core worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_beat:
    build: .
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost && psql -U postgres -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s  # ✅ Give DB time to initialize

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_volume:
  media_volume: